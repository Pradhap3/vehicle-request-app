services:
  - type: web
    name: aisin-fleet-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: "1433"
      - key: DB_ENCRYPT
        value: "true"
      - key: DB_TRUST_SERVER_CERT
        value: "false"
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 8h
      - key: REFRESH_TOKEN_EXPIRY
        value: 7d
      - key: ENABLE_AI_FEATURES
        value: "true"
      - key: BOOKING_MIN_ADVANCE_MINUTES
        value: "60"
      - key: AUTO_ASSIGN_WINDOW_MINUTES
        value: "30"
      - key: REQUEST_CONFLICT_WINDOW_MINUTES
        value: "180"
      - key: REQUIRE_CALL_ATTEMPT_FOR_NO_SHOW
        value: "true"
      - key: CALL_ATTEMPT_WINDOW_MINUTES
        value: "15"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
